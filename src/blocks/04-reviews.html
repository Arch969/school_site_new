<section class="ku-reviews" id="reviews">
  <div class="ku-reviews__bg ku-reviews__bg--1"></div>
  <div class="ku-reviews__bg ku-reviews__bg--2"></div>

  <div class="ku-reviews__container">
    <div class="ku-reviews__head ku-reviews__reveal">
      <h2 class="ku-reviews__title">
        Что говорят <span>о занятиях</span>
      </h2>
    </div>

    <div class="ku-video-reviews ku-reviews__reveal" data-carousel data-per-page-desktop="5" data-per-page-tablet="3" data-per-page-mobile="1" aria-roledescription="carousel" aria-label="Видеоотзывы">
      <button class="ku-video-reviews__nav ku-video-reviews__nav--prev" type="button" aria-label="Предыдущий видеоотзыв" data-carousel-prev>
        <span aria-hidden="true">&lsaquo;</span>
      </button>

      <div class="ku-video-reviews__viewport">
        <div class="ku-video-reviews__track" data-carousel-track>
          <article class="ku-video-review" aria-label="Видеоотзыв 1">
            <div class="ku-video-review__slot">
              <video class="ku-video-review__video" data-src="media/video/video1.mp4" poster="media/video/video1-poster.jpg" preload="none" playsinline></video>
              <button class="ku-video-review__play" type="button" aria-label="Запустить видео" data-video-play></button>
            </div>
          </article>

          <article class="ku-video-review" aria-label="Видеоотзыв 2">
            <div class="ku-video-review__slot" aria-hidden="true"></div>
          </article>

          <article class="ku-video-review" aria-label="Видеоотзыв 3">
            <div class="ku-video-review__slot" aria-hidden="true"></div>
          </article>

          <article class="ku-video-review" aria-label="Видеоотзыв 4">
            <div class="ku-video-review__slot" aria-hidden="true"></div>
          </article>

          <article class="ku-video-review" aria-label="Видеоотзыв 5">
            <div class="ku-video-review__slot" aria-hidden="true"></div>
          </article>
        </div>
      </div>

      <button class="ku-video-reviews__nav ku-video-reviews__nav--next" type="button" aria-label="Следующий видеоотзыв" data-carousel-next>
        <span aria-hidden="true">&rsaquo;</span>
      </button>

      <div class="ku-video-reviews__dots" data-carousel-dots aria-label="Навигация по видеоотзывам"></div>
    </div>
  </div>
</section>
