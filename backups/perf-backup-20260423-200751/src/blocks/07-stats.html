<section class="ku-stats" id="stats">
  <div class="ku-stats__mesh"></div>

  <div class="ku-stats__container">
    <div class="ku-stats__head ku-stats__reveal">
      <div class="ku-stats__badge">Наши результаты</div>
      <h2 class="ku-stats__title">
        Цифры, которые<br>
        <span>говорят сами за себя</span>
      </h2>
    </div>

    <div class="ku-stats__featured">
      <article class="ku-stat-feature ku-stat-feature--blue ku-stats__reveal">
        <div class="ku-stat-feature__icon">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 18.5c1.8-2.1 4.4-3.2 8-3.2s6.2 1.1 8 3.2M8.2 8.4a3.8 3.8 0 1 0 7.6 0 3.8 3.8 0 0 0-7.6 0Z"/></svg>
        </div>
        <div class="ku-stat-feature__number"><span data-count="10000">0</span>+</div>
        <div class="ku-stat-feature__label">учеников</div>
        <div class="ku-stat-feature__hint">выбрали обучение у нас</div>
      </article>

      <article class="ku-stat-feature ku-stat-feature--yellow ku-stats__reveal">
        <div class="ku-stat-feature__icon">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 4h8v5h4v11H4V9h4V4Zm3 5h2M8 14h8M8 17h5"/></svg>
        </div>
        <div class="ku-stat-feature__number"><span data-count="16">0</span>+</div>
        <div class="ku-stat-feature__label">курсов</div>
        <div class="ku-stat-feature__hint">от старта до продвинутых проектов</div>
      </article>

      <article class="ku-stat-feature ku-stat-feature--red ku-stats__reveal">
        <div class="ku-stat-feature__icon">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16v10H9l-5 4V6Zm4 4h8M8 13h5"/></svg>
        </div>
        <div class="ku-stat-feature__number"><span data-count="100">0</span>+</div>
        <div class="ku-stat-feature__label">педагогов</div>
        <div class="ku-stat-feature__hint">практикующие специалисты</div>
      </article>

      <article class="ku-stat-feature ku-stat-feature--violet ku-stats__reveal">
        <div class="ku-stat-feature__icon">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3c3.4 1.8 5.1 4.7 5.1 8.6L21 15.5l-4.4 1.2-1.2 4.3-3.4-3.4L8.6 21l-1.2-4.3L3 15.5l3.9-3.9C6.9 7.7 8.6 4.8 12 3Zm0 6.5a2.1 2.1 0 1 0 0 4.2 2.1 2.1 0 0 0 0-4.2Z"/></svg>
        </div>
        <div class="ku-stat-feature__number"><span data-count="140000">0</span>+</div>
        <div class="ku-stat-feature__label">проектов создано</div>
        <div class="ku-stat-feature__hint">учениками за всё время</div>
      </article>
    </div>

    <div class="ku-stats__mini">
      <div class="ku-stat-mini ku-stats__reveal">
        <strong>6-16</strong>
        <span>лет</span>
      </div>
      <div class="ku-stat-mini ku-stats__reveal">
        <strong>55</strong>
        <span>минут урок</span>
      </div>
      <div class="ku-stat-mini ku-stats__reveal">
        <strong>1:1</strong>
        <span>формат</span>
      </div>
      <div class="ku-stat-mini ku-stats__reveal">
        <strong>0 ₽</strong>
        <span>пробный урок</span>
      </div>
      <div class="ku-stat-mini ku-stats__reveal">
        <strong>16+</strong>
        <span>направлений</span>
      </div>
      <div class="ku-stat-mini ku-stats__reveal">
        <strong>100+</strong>
        <span>педагогов</span>
      </div>
    </div>
  </div>
</section>
